<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MTG Collection Manager</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 30px;
    }

    h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
      background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stats-bar {
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-around;
      flex-wrap: wrap;
      gap: 15px;
    }

    .stat {
      text-align: center;
    }

    .stat-value {
      font-size: 1.8em;
      font-weight: bold;
      color: #4ecdc4;
    }

    .stat-label {
      font-size: 0.9em;
      color: #aaa;
      margin-top: 5px;
    }

    .controls {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      align-items: center;
    }

    input[type="text"],
    input[type="file"],
    select {
      padding: 10px 15px;
      border: 2px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: #fff;
      border-radius: 8px;
      font-size: 1em;
      outline: none;
      transition: all 0.3s;
    }

    input[type="text"] {
      flex: 1;
      min-width: 200px;
    }

    input[type="text"]:focus,
    select:focus {
      border-color: #4ecdc4;
      background: rgba(78, 205, 196, 0.1);
    }

    button {
      padding: 10px 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1em;
      font-weight: bold;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    .upload-section {
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
      border: 2px dashed rgba(255,255,255,0.2);
    }

    .upload-section h3 {
      margin-bottom: 10px;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      overflow: hidden;
      transition: transform 0.3s, box-shadow 0.3s;
      cursor: pointer;
      border: 2px solid transparent;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      border-color: #4ecdc4;
    }

    .card-image {
      width: 100%;
      height: 340px;
      object-fit: cover;
      background: #000;
    }

    .card-info {
      padding: 15px;
    }

    .card-name {
      font-size: 1.1em;
      font-weight: bold;
      margin-bottom: 8px;
      color: #4ecdc4;
    }

    .card-details {
      font-size: 0.85em;
      color: #aaa;
      margin-bottom: 5px;
    }

    .card-quantity {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
    }

    .card-quantity input {
      width: 60px;
      padding: 5px;
      text-align: center;
    }

    .price {
      color: #ffd700;
      font-weight: bold;
    }

    .foil-badge {
      display: inline-block;
      background: linear-gradient(135deg, #ffd700, #ffed4e);
      color: #000;
      padding: 3px 8px;
      border-radius: 5px;
      font-size: 0.75em;
      font-weight: bold;
      margin-left: 5px;
    }

    .loading {
      text-align: center;
      padding: 50px;
      font-size: 1.2em;
      color: #4ecdc4;
    }

    .no-image {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 340px;
      background: linear-gradient(135deg, #2d3748, #1a202c);
      font-size: 1.2em;
      color: #666;
    }

    @media (max-width: 768px) {
      .cards-grid {
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      }
      
      .card-image, .no-image {
        height: 250px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🎴 MTG Collection Manager</h1>
    </header>

    <div class="stats-bar" id="stats">
      <div class="stat">
        <div class="stat-value" id="totalCards">-</div>
        <div class="stat-label">Cartas Únicas</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="totalCopies">-</div>
        <div class="stat-label">Copias Totales</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="totalValue">-</div>
        <div class="stat-label">Valor (EUR)</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="totalFoils">-</div>
        <div class="stat-label">Foils</div>
      </div>
    </div>

    <div class="upload-section">
      <h3>📤 Subir Colección (CSV)</h3>
      <p style="margin: 10px 0; color: #aaa; font-size: 0.9em;">
        <strong>Formatos soportados:</strong><br/>
        • <strong>Manabox:</strong> Exporta desde la app y sube directamente<br/>
        • <strong>Simple:</strong> <code>nombre,set,cantidad,foil,condicion</code>
      </p>
      <input type="file" id="csvFile" accept=".csv" />
      <button onclick="uploadCSV()">Subir CSV</button>
      <span id="uploadStatus" style="margin-left: 15px; color: #4ecdc4;"></span>
    </div>

    <div class="controls">
      <input type="text" id="searchInput" placeholder="🔍 Buscar carta..." oninput="filterCards()" />
      <select id="colorFilter" onchange="filterCards()">
        <option value="">Todos los colores</option>
        <option value="W">⚪ Blanco</option>
        <option value="U">🔵 Azul</option>
        <option value="B">⚫ Negro</option>
        <option value="R">🔴 Rojo</option>
        <option value="G">🟢 Verde</option>
      </select>
      <select id="rarityFilter" onchange="filterCards()">
        <option value="">Todas las rarezas</option>
        <option value="common">Common</option>
        <option value="uncommon">Uncommon</option>
        <option value="rare">Rare</option>
        <option value="mythic">Mythic</option>
      </select>
      <button onclick="loadCards()">🔄 Recargar</button>
    </div>

    <div class="cards-grid" id="cardsGrid">
      <div class="loading">Cargando colección...</div>
    </div>
  </div>

  <script>
    let allCards = [];

    // Load stats
    async function loadStats() {
      const res = await fetch('/api/stats');
      const stats = await res.json();
      document.getElementById('totalCards').textContent = stats.total_cards || 0;
      document.getElementById('totalCopies').textContent = stats.total_copies || 0;
      document.getElementById('totalValue').textContent = stats.total_value_eur 
        ? `€${stats.total_value_eur.toFixed(2)}` 
        : '€0.00';
      document.getElementById('totalFoils').textContent = stats.total_foils || 0;
    }

    // Load cards
    async function loadCards() {
      const res = await fetch('/api/cards');
      allCards = await res.json();
      displayCards(allCards);
      loadStats();
    }

    // Display cards
    function displayCards(cards) {
      const grid = document.getElementById('cardsGrid');
      if (cards.length === 0) {
        grid.innerHTML = '<div class="loading">No hay cartas en tu colección</div>';
        return;
      }

      grid.innerHTML = cards.map(card => `
        <div class="card">
          ${card.image_uri 
            ? `<img src="${card.image_uri}" alt="${card.name}" class="card-image" />`
            : `<div class="no-image">Sin imagen</div>`
          }
          <div class="card-info">
            <div class="card-name">
              ${card.name}
              ${card.foil ? '<span class="foil-badge">FOIL</span>' : ''}
            </div>
            <div class="card-details">${card.set_code || 'N/A'} • ${card.rarity || 'N/A'}</div>
            <div class="card-details">${card.type_line || ''}</div>
            ${card.price_eur ? `<div class="price">€${card.price_eur.toFixed(2)}</div>` : ''}
            <div class="card-quantity">
              <span>Cantidad:</span>
              <input type="number" min="1" value="${card.quantity}" 
                     onchange="updateQuantity(${card.id}, this.value)" />
              <button onclick="deleteCard(${card.id})" style="padding: 5px 10px; font-size: 0.9em;">🗑️</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    // Filter cards
    function filterCards() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const color = document.getElementById('colorFilter').value;
      const rarity = document.getElementById('rarityFilter').value;

      const filtered = allCards.filter(card => {
        const matchSearch = card.name.toLowerCase().includes(search);
        const matchColor = !color || (card.colors && card.colors.includes(color));
        const matchRarity = !rarity || card.rarity === rarity;
        return matchSearch && matchColor && matchRarity;
      });

      displayCards(filtered);
    }

    // Update quantity
    async function updateQuantity(id, newQty) {
      await fetch(`/api/cards/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ quantity: parseInt(newQty) })
      });
      loadCards();
    }

    // Delete card
    async function deleteCard(id) {
      if (!confirm('¿Eliminar esta carta?')) return;
      await fetch(`/api/cards/${id}`, { method: 'DELETE' });
      loadCards();
    }

    // Upload CSV
    async function uploadCSV() {
      const fileInput = document.getElementById('csvFile');
      const statusSpan = document.getElementById('uploadStatus');
      
      if (!fileInput.files[0]) {
        statusSpan.textContent = '❌ Selecciona un archivo CSV';
        return;
      }

      const formData = new FormData();
      formData.append('csv', fileInput.files[0]);

      statusSpan.textContent = '⏳ Subiendo y procesando...';

      try {
        const res = await fetch('/api/upload', {
          method: 'POST',
          body: formData
        });
        const result = await res.json();
        
        if (result.success) {
          statusSpan.textContent = `✅ ${result.message}`;
          fileInput.value = '';
          setTimeout(() => loadCards(), 1000);
        } else {
          statusSpan.textContent = `❌ Error: ${result.error}`;
        }
      } catch (error) {
        statusSpan.textContent = `❌ Error: ${error.message}`;
      }
    }

    // Initial load
    loadCards();
  </script>
</body>
</html>
